    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            /* Fluid Typography - Dioptimalkan untuk responsivitas semua layar */
            --font-title: clamp(0.85rem, 2.5vw, 1.6rem);
            --font-kpi-val: clamp(0.8rem, 2.2vw, 1.25rem);
            --font-label: clamp(0.6rem, 1.2vw, 0.72rem);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            letter-spacing: -0.02em; 
            background-color: #f8fafc; 
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Desktop: gunakan fixed height HANYA jika layar benar-benar cukup tinggi */
        @media (min-width: 1280px) and (min-height: 768px) {
            body { 
                height: 100vh;
                overflow: hidden; 
            }
            .main-scroll-area {
                overflow-y: auto;
            }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .chart-svg { overflow: visible !important; height: 100%; width: 100%; }
        .line-transition { transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* SIDEBAR NAVIGATION STYLES */
        #sidebar-nav { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 260px; }
        .collapsed { width: 72px !important; }
        .nav-label { transition: opacity 0.3s ease, visibility 0.3s ease; }
        .collapsed .nav-label { opacity: 0; visibility: hidden; width: 0; overflow: hidden; }
        .collapsed .nav-section-title { opacity: 0; visibility: hidden; }
        .nav-item { transition: all 0.2s ease; border-radius: 1rem; margin: 0.15rem 0.6rem; }
        .collapsed .nav-item { margin: 0.15rem 0.4rem; padding: 0.75rem; justify-content: center; }
        .nav-item.active { background-color: #eff6ff; color: #2563eb; font-weight: 800; }

        /* MOBILE: sidebar jadi overlay drawer */
        @media (max-width: 767px) {
            #sidebar-nav {
                position: fixed !important;
                top: 0; left: 0; bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), width 0.35s;
                width: 240px !important;
                box-shadow: 4px 0 24px rgba(0,0,0,0.10);
            }
            #sidebar-nav.mobile-open {
                transform: translateX(0);
            }
            #sidebar-overlay {
                display: none;
                position: fixed; inset: 0; z-index: 99;
                background: rgba(15,23,42,0.35);
                backdrop-filter: blur(2px);
            }
            #sidebar-overlay.active { display: block; }
            .collapsed { width: 240px !important; }
            .collapsed .nav-label { opacity: 1; visibility: visible; width: auto; }
            .collapsed .nav-section-title { opacity: 1; visibility: visible; }
        }

        /* Typography Helpers */
        .text-fluid-title { font-size: var(--font-title); font-weight: 900; line-height: 1.1; }
        .text-fluid-kpi { font-size: var(--font-kpi-val); font-weight: 900; line-height: 1; }
        .text-fluid-label { font-size: var(--font-label); font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>

                return selectedRegion === 'All Regions' ? rawData : rawData.filter(d => d.region === selectedRegion);

                const count = filteredData.length || 1;
                return {
                    netAct: filteredData.reduce((s,c)=>s+c.netAct,0),
                    netTar: filteredData.reduce((s,c)=>s+c.netTar,0),
                    slbAct: filteredData.reduce((s,c)=>s+c.slbAct,0),
                    slbTar: filteredData.reduce((s,c)=>s+c.slbTar,0),
                    mmcAct: filteredData.reduce((s,c)=>s+c.mmcAct,0),
                    mmcTar: filteredData.reduce((s,c)=>s+c.mmcTar,0),
                    mftbcAct: filteredData.reduce((s,c)=>s+c.mftbcAct,0),
                    mftbcTar: filteredData.reduce((s,c)=>s+c.mftbcTar,0),
                    roaAct: (filteredData.reduce((s,c)=>s+c.roaAct,0) / count),
                    roaTar: (filteredData.reduce((s,c)=>s+c.roaTar,0) / count),
                    npfAct: filteredData.reduce((s,c)=>s+c.npfAct,0),
                    npfTar: filteredData.reduce((s,c)=>s+c.npfTar,0)
                };
            }, [filteredData]);

            const sortedRank = useMemo(() => {
                const m = metricsConfig[activeMetric];
                const stats = rawData.filter(d => d.region === selectedRegion || selectedRegion === 'All Regions')

                        if (!acc[curr.branch]) acc[curr.branch] = { name: curr.branch, val: 0, tar: 0 };
                        acc[curr.branch].val += curr[m.actKey];
                        acc[curr.branch].tar += curr[m.tarKey];
                        return acc;
                    }, {});
                return Object.values(stats)
                    .map(item => ({ ...item, ach: item.tar > 0 ? (item.val / item.tar) * 100 : 0 }))
                    .sort((a,b) => b.ach - a.ach);
            }, [selectedRegion, activeMetric]);

            const chartData = useMemo(() => {
                const m = metricsConfig[activeMetric];
                const width = 1000; const height = 300; 
                const paddingX = 50; const bottomLimit = 265; const topLimit = 30;
                const chartHeightArea = bottomLimit - topLimit;
                const allVals = filteredData.flatMap(d => [d[m.actKey]/m.divider, d[m.tarKey]/m.divider]);
                const maxVal = Math.max(...allVals) * 1.05 || 100;
                const minVal = Math.min(0, ...allVals) - (maxVal * 0.05);
                const getX = (i) => paddingX + (i * (width - 2 * paddingX) / Math.max(filteredData.length - 1, 1));
                const getY = (val) => bottomLimit - ((val - minVal) / (maxVal - minVal) * chartHeightArea);
                const actPoints = filteredData.map((d, i) => `${getX(i)},${getY(d[m.actKey]/m.divider)}`);
                const areaPath = `M ${getX(0)},${bottomLimit} ` + actPoints.map(p => `L ${p}`).join(' ') + ` L ${getX(filteredData.length - 1)},${bottomLimit} Z`;
                return {
                    areaPath, bottomLimit,
                    actPath: `M ${actPoints.join(' L ')}`,
                    tarPath: `M ${filteredData.map((d, i) => `${getX(i)},${getY(d[m.tarKey]/m.divider)}`).join(' L ')}`,
                    points: filteredData.map((d, i) => ({
                        x: getX(i), yAct: getY(d[m.actKey]/m.divider), yTar: getY(d[m.tarKey]/m.divider),
                        label: selectedRegion === 'All Regions' ? (branchAbbreviations[d.branch] || d.branch) : d.branch,
                        valAct: activeMetric === 'roa' ? (d[m.actKey] * 100).toFixed(1) : (d[m.actKey]/m.divider).toFixed(m.divider > 1 ? 1 : 0),
                        valTar: activeMetric === 'roa' ? (d[m.tarKey] * 100).toFixed(1) : (d[m.tarKey]/m.divider).toFixed(m.divider > 1 ? 1 : 0)
                    })),
                    color: m.color, unit: m.unit
                };
            }, [filteredData, activeMetric, selectedRegion]);

            return (
                <div className="flex min-h-screen bg-[#F8FAFC]" style={{minHeight: '100vh'}}>
                    
                    {/* SIDEBAR NAVIGATION */}
                    <aside id="sidebar-nav" className={`bg-white border-r border-slate-100 flex flex-col shrink-0 z-50 transition-all ${!isSidebarExpanded ? 'collapsed w-[72px]' : 'w-[260px]'}`}>
                        <div className="h-16 md:h-20 flex items-center px-4 md:px-6 shrink-0 relative">
                            {/* Mobile hamburger - hanya di mobile */}
                            <button 
                                className="md:hidden mr-3 w-8 h-8 flex flex-col justify-center items-center gap-1.5 shrink-0"
                                onClick={() => {
                                    document.getElementById('sidebar-nav').classList.remove('mobile-open');
                                    document.getElementById('sidebar-overlay').classList.remove('active');
                                }}
                            >
                                <span className="w-5 h-0.5 bg-slate-400 rounded"></span>
                                <span className="w-5 h-0.5 bg-slate-400 rounded"></span>
                            </button>
                            <div className="w-9 h-9 md:w-10 md:h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shrink-0 uppercase text-sm">E</div>
                            <span className="nav-label ml-3 text-base md:text-lg font-black tracking-tight text-slate-900 uppercase">Dashboard</span>
                            {/* Desktop collapse button */}
                            <button onClick={() => setIsSidebarExpanded(!isSidebarExpanded)} className="hidden md:flex absolute -right-3 top-1/2 -translate-y-1/2 w-6 h-6 bg-white border border-slate-100 rounded-full items-center justify-center shadow-md hover:bg-slate-50 transition-all">
                                <Icon name={isSidebarExpanded ? "chevron-left" : "chevron-right"} size={12} className="text-slate-400" />
                            </button>
                        </div>

                        <nav className="flex-1 lg:overflow-y-auto pt-4 space-y-6 no-scrollbar">
                            <div>
                                <p className="nav-section-title px-8 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 text-left">Executive Hub</p>
                                <div className="space-y-0.5">
                                    <a href="#" className="nav-item flex items-center px-5 py-3 active group text-sm font-bold">
                                        <Icon name="layout-dashboard" className="w-5 h-5 shrink-0" />
                                        <span className="nav-label ml-4 whitespace-nowrap">KPI Performance</span>
                                    </a>
                                </div>
                            </div>
                            <div>
                                <p className="nav-section-title px-8 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 text-left">Strategic View</p>
                                <div className="space-y-0.5">
                                    <a href="Dashboard_Asset.html" className="nav-item flex items-center px-5 py-3 text-slate-500 hover:bg-slate-50 transition-all text-sm font-medium">
                                        <Icon name="box" className="w-5 h-5 shrink-0" />
                                        <span className="nav-label ml-4 whitespace-nowrap">Asset Dashboard</span>
                                    </a>
                                    <a href="Dashboard_MMKSI_KTB.html" className="nav-item flex items-center px-5 py-3 text-slate-500 hover:bg-slate-50 transition-all text-sm font-medium">
                                        <Icon name="at-sign" className="w-5 h-5 shrink-0" />
                                        <span className="nav-label ml-4 whitespace-nowrap">ATPM Pulse</span>
                                    </a>
                                </div>
                            </div>
                        </nav>
                        <div className="p-4 border-t border-slate-50">
                            <div className="nav-item flex items-center px-4 py-3 text-slate-400 cursor-pointer hover:bg-slate-50 rounded-xl transition-all text-left">
                                <Icon name="log-out" size={18} className="shrink-0" />
                                <span className="nav-label ml-4 text-xs font-bold uppercase tracking-widest">Logout</span>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <div className="flex-1 flex flex-col min-w-0" style={{minWidth: 0}}>
                        <div className="p-3 md:p-4 lg:p-6 flex flex-col gap-4 md:gap-5 lg:gap-6 main-scroll-area" style={{overflowY: 'auto', flex: 1}}>
                            
                            <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 md:gap-4 shrink-0">
                                <div className="flex items-center gap-3 min-w-0">
                                    {/* Mobile hamburger to open sidebar */}
                                    <button 
                                        className="md:hidden w-9 h-9 bg-white rounded-xl border border-slate-100 shadow-sm flex flex-col justify-center items-center gap-1.5 shrink-0"
                                        onClick={() => {
                                            document.getElementById('sidebar-nav').classList.add('mobile-open');
                                            document.getElementById('sidebar-overlay').classList.add('active');
                                        }}
                                    >
                                        <span className="w-4 h-0.5 bg-slate-600 rounded"></span>
                                        <span className="w-4 h-0.5 bg-slate-600 rounded"></span>
                                        <span className="w-4 h-0.5 bg-slate-600 rounded"></span>
                                    </button>
                                    <div className="min-w-0">
                                        <p className="text-[9px] md:text-[10px] font-extrabold uppercase tracking-[0.3em] text-blue-600 mb-0.5">Monitoring Hub</p>
                                        <h1 className="text-fluid-title uppercase tracking-tighter leading-tight font-black">Executive Performance FY25</h1>
                                    </div>
                                </div>
                                <div className="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100 shrink-0 max-w-full overflow-x-auto no-scrollbar">
                                    {regions.map(r => (
                                        <button key={r} onClick={() => setSelectedRegion(r)} className={`px-2.5 md:px-3 lg:px-4 py-1.5 rounded-xl text-[9px] md:text-[10px] font-black transition-all whitespace-nowrap ${selectedRegion === r ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400 hover:text-slate-600'}`}>
                                            {r}
                                        </button>
                                    ))}
                                </div>
                            </header>

                            {/* Top KPI Cards */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-3 lg:gap-5 shrink-0">
                                <KPICard title="NET DISBURSE" value={`${(totals.netAct/1000000000).toFixed(1)}B`} targetValue={totals.netTar} actValue={totals.netAct} icon="trending-up" color="blue" />
                                <KPICard title="SLB UNIT" value={`${totals.slbAct.toLocaleString()}`} targetValue={totals.slbTar} actValue={totals.slbAct} icon="car" color="amber" />
                                <KPICard title="MMC UNIT" value={`${totals.mmcAct.toLocaleString()}`} targetValue={totals.mmcTar} actValue={totals.mmcAct} icon="car-front" color="emerald" />
                                <KPICard title="MFTBC UNIT" value={`${totals.mftbcAct.toLocaleString()}`} targetValue={totals.mftbcTar} actValue={totals.mftbcAct} icon="truck" color="violet" />
                            </div>

                            {/* Center Main Grid */}
                            <div className="flex flex-col xl:flex-row gap-4 lg:gap-5 xl:gap-6" style={{flex: 1, minHeight: 0}}>
                                
                                {/* LEFT AREA: CHARTS */}
                                <div className="flex flex-col gap-3 md:gap-4 lg:gap-5" style={{flex: '9 9 0%', minWidth: 0}}>
                                    <div className="grid grid-cols-2 gap-2 md:gap-3 lg:gap-5 shrink-0">
                                        <KPICard title="AVG ROA (%)" value={`${(totals.roaAct*100).toFixed(2)}%`} targetValue={totals.roaTar} actValue={totals.roaAct} icon="percent" color="pink" compact />
                                        <KPICard title="NPF RISK" value={`${(totals.npfAct/1000000000).toFixed(1)}B`} targetValue={totals.npfTar} actValue={totals.npfAct} icon="alert-triangle" color="rose" risk={totals.npfAct > totals.npfTar} compact />
                                    </div>

                                    <div className="bg-white rounded-3xl p-4 md:p-6 lg:p-8 shadow-sm border border-slate-100 flex flex-col" style={{minHeight: '320px', flex: 1}}>
                                        <div className="flex justify-between items-center mb-6 shrink-0">
                                            <h3 className="text-sm font-black text-slate-900 uppercase tracking-tight flex items-center gap-2 leading-none">
                                                <Icon name="line-chart" className="text-blue-600" size={18} /> Strategic Trend Analysis
                                            </h3>
                                            <div className="flex p-0.5 bg-slate-50 rounded-xl border border-slate-100 max-w-full overflow-x-auto no-scrollbar" style={{WebkitOverflowScrolling: 'touch'}}>
                                                {Object.entries(metricsConfig).map(([key, m]) => (
                                                    <button key={key} onClick={() => setActiveMetric(key)} className={`px-2.5 md:px-3 py-1.5 rounded-lg text-[7px] md:text-[8px] font-black uppercase transition-all whitespace-nowrap ${activeMetric === key ? 'bg-white text-slate-900 shadow-sm border border-slate-200' : 'text-slate-400'}`}>{m.label}</button>
                                                ))}
                                            </div>
                                        </div>

                                        <div style={{flex: 1, minHeight: '220px', overflowX: 'auto', overflowY: 'hidden', WebkitOverflowScrolling: 'touch'}} className="no-scrollbar">
                                            <div style={{minWidth: '600px', height: '100%', minHeight: '220px'}}>
                                            <svg viewBox="0 0 1000 300" preserveAspectRatio="xMidYMid meet" className="chart-svg" style={{width: '100%', height: '100%'}}>
                                                <defs>
                                                    <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="0%" stopColor={chartData.color} stopOpacity="0.15" />
                                                        <stop offset="100%" stopColor={chartData.color} stopOpacity="0.02" />
                                                    </linearGradient>
                                                </defs>
                                                {[0, 0.25, 0.5, 0.75, 1].map(v => (<line key={v} x1="40" y1={chartData.bottomLimit - (v * 235)} x2="960" y2={chartData.bottomLimit - (v * 235)} stroke="#f1f5f9" strokeWidth="1.5" />))}
                                                <path d={chartData.areaPath} fill="url(#chartGradient)" className="line-transition" />
                                                <path d={chartData.tarPath} fill="none" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="5 5" className="line-transition opacity-50" />
                                                <path d={chartData.actPath} fill="none" stroke={chartData.color} strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" className="line-transition shadow-sm" />
                                                {chartData.points.map((p, i) => {
                                                    const isDense = chartData.points.length > 15;
                                                    const badgeW = isDense ? 52 : 64; 
                                                    const badgeH = 18;
                                                    const isOverlap = Math.abs(p.yAct - p.yTar) < 40;
                                                    let actOffset = -36; let tarOffset = 12;
                                                    if (isOverlap) {
                                                        if (p.yAct < p.yTar) { actOffset = -42; tarOffset = 18; } 
                                                        else { actOffset = -30; tarOffset = 14; }
                                                    }
                                                    return (
                                                        <g key={i} className="cursor-default">
                                                            <circle cx={p.x} cy={p.yTar} r="2" fill="#94a3b8" />
                                                            <circle cx={p.x} cy={p.yAct} r="7" fill="white" stroke={chartData.color} strokeWidth="4" className="line-transition shadow-sm" />
                                                            <g>
                                                                <rect x={p.x - (badgeW/2)} y={p.yAct + actOffset} width={badgeW} height={badgeH} rx="5" fill="white" stroke={chartData.color} strokeWidth="1.5" />
                                                                <text x={p.x} y={p.yAct + actOffset + 13} textAnchor="middle" className="text-[9px] font-black" style={{ fill: chartData.color }}>{p.valAct}{chartData.unit}</text>
                                                            </g>
                                                            <g>
                                                                <rect x={p.x - (badgeW/2)} y={p.yTar + tarOffset} width={badgeW} height={badgeH - 2} rx="4" fill="white" stroke="#cbd5e1" strokeWidth="1" />
                                                                <text x={p.x} y={p.yTar + tarOffset + 11} textAnchor="middle" className="text-[8px] font-bold fill-slate-500">{p.valTar}{chartData.unit}</text>
                                                            </g>
                                                            <text 
                                                                x={p.x} 
                                                                y="295" 
                                                                textAnchor={isDense ? "end" : "middle"} 
                                                                className={`font-black fill-slate-300 uppercase tracking-tighter ${isDense ? 'text-[8px]' : 'text-[9px]'}`}
                                                                transform={isDense ? `rotate(-45, ${p.x}, 295)` : ""}
                                                            >
                                                                {p.label}
                                                            </text>
                                                        </g>
                                                    );
                                                })}
                                            </svg>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* RIGHT AREA: KEY ACHIEVEMENT */}
                                <div className="flex flex-col gap-3 md:gap-4 lg:gap-5" style={{flex: '3 3 0%', minWidth: '240px'}}>
                                    <div className="bg-white rounded-3xl p-5 md:p-6 lg:p-7 shadow-sm border border-slate-100 flex flex-col text-center" style={{flex: 1, minHeight: '300px', overflow: 'hidden'}}>
                                        <h3 className="font-black text-sm text-slate-900 mb-6 uppercase tracking-tight flex items-center gap-2 shrink-0 leading-none text-left">
                                            <Icon name="pie-chart" size={18} className="text-blue-600" /> Key Achievement
                                        </h3>
                                        
                                        <div className="flex-1 flex flex-col justify-around py-2 gap-6 lg:gap-2 lg:min-h-0 overflow-hidden">
                                            <AchievementItem label="NET DISBURSE" act={totals.netAct} tar={totals.netTar} color="blue" unit="B" divider={1000000000} />
                                            <AchievementItem label="SLB UNITS" act={totals.slbAct} tar={totals.slbTar} color="amber" unit=" Unit" divider={1} />
                                            <AchievementItem label="MMC UNITS" act={totals.mmcAct} tar={totals.mmcTar} color="emerald" unit=" Unit" divider={1} />
                                            <AchievementItem label="MFTBC UNITS" act={totals.mftbcAct} tar={totals.mftbcTar} color="violet" unit=" Unit" divider={1} />
                                        </div>
                                        
                                        {/* Strategic Ranking Section */}
                                        <div className="mt-6 pt-6 border-t border-slate-50 shrink-0 text-left">
                                            <div className="bg-slate-50 rounded-[1.5rem] p-4 flex justify-between items-center border border-slate-100 group">
                                                <div className="min-w-0">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Strategic Rank</p>
                                                    <p className="text-[12px] font-black text-slate-900 uppercase truncate w-32 tracking-tight leading-none">
                                                        {sortedRank[0]?.name || 'N/A'}
                                                    </p>
                                                    <p className="text-[9px] font-bold text-blue-600 mt-2 uppercase bg-white w-fit px-2 py-0.5 rounded border border-blue-50 shadow-sm">
                                                        {sortedRank[0]?.ach.toFixed(0) || 0}% Achievement
                                                    </p>
                                                </div>
                                                <div className="bg-blue-600 text-white w-12 h-12 rounded-2xl shadow-lg flex flex-col items-center justify-center shrink-0 border-4 border-white transition-transform group-hover:scale-110">
                                                    <span className="text-2xl font-black leading-none">1</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const KPICard = ({ title, value, targetValue, actValue, icon, color, risk, compact }) => {
            const colors = { blue: 'bg-blue-50 text-blue-600', emerald: 'bg-emerald-50 text-emerald-600', violet: 'bg-violet-50 text-violet-600', rose: 'bg-rose-50 text-rose-600 border-rose-100', amber: 'bg-amber-50 text-amber-600', pink: 'bg-pink-50 text-pink-600' };
            
            const deviation = useMemo(() => {
                if (!targetValue || targetValue === 0) return null;
                const diff = ((actValue - targetValue) / targetValue) * 100;
                const isRiskMetric = title.includes('NPF');
                let isGood = isRiskMetric ? (actValue <= targetValue) : (actValue >= targetValue);
                return {
                    val: Math.abs(diff).toFixed(1) + '%',
                    isGood: isGood,
                    isUp: actValue >= targetValue,
                    label: isRiskMetric ? 'vs Limit' : 'vs Target'
                };
            }, [targetValue, actValue, title]);

            const devColor = deviation ? (deviation.isGood ? 'text-emerald-500' : 'text-rose-500') : '';

            return (
                <div className={`bg-white rounded-2xl border border-slate-100 shadow-sm flex items-center gap-3 transition-all ${compact ? 'p-3' : 'p-4 lg:p-5'}`}>
                    <div className={`rounded-xl shrink-0 ${compact ? 'p-2' : 'p-3'} ${colors[color]} shadow-sm`}><Icon name={icon} size={compact ? 18 : 22} /></div>
                    <div className="flex-grow min-w-0">
                        <p className="text-fluid-label truncate leading-none text-slate-400 mb-1.5">{title}</p>
                        <div className="flex flex-col">
                            <h2 className="text-fluid-kpi text-slate-900 tracking-tighter leading-none font-black">{value}</h2>
                            {!compact && deviation && (
                                <p className={`text-[10px] font-black mt-2 flex items-center gap-1 ${devColor}`}>
                                    {deviation.isUp ? '↑' : '↓'} {deviation.val} <span className="opacity-70">{deviation.label}</span>
                                </p>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const AchievementItem = ({ label, act, tar, color, unit, divider }) => {
            const pct = Math.round((act / (tar || 1)) * 100);
            const colorClass = { blue: 'bg-blue-600', amber: 'bg-amber-500', emerald: 'bg-emerald-600', violet: 'bg-violet-600' }[color];
            return (
                <div className="w-full text-left group">
                    <div className="flex justify-between items-end mb-1.5">
                        <p className="text-fluid-label text-slate-500 group-hover:text-slate-900 transition-colors">{label}</p>
                        <p className="text-[12px] font-black text-slate-900 leading-none">{pct}%</p>
                    </div>
                    <div className="h-2.5 w-full bg-slate-100 rounded-full overflow-hidden p-0.5 shadow-inner mb-1.5"> 
                        <div className={`h-full ${colorClass} rounded-full transition-all duration-1000 ease-out shadow-lg`} style={{ width: `${Math.min(pct, 100)}%` }}></div>
                    </div>
                    <div className="flex justify-between text-[9px] font-extrabold text-slate-400 uppercase tracking-widest leading-none">
                        <span>ACT: {(act/divider).toLocaleString()}{unit}</span>
                        <span>TAR: {(tar/divider).toLocaleString()}{unit}</span>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        function closeMobileSidebar() {
            document.getElementById('sidebar-nav').classList.remove('mobile-open');
            document.getElementById('sidebar-overlay').classList.remove('active');
        }
    </script>
</body>
</html>
